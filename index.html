<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James Clegg</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 480px;
            width: 100%;
            padding: 2rem;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        p.subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        a.card {
            display: block;
            padding: 1.25rem;
            background: #1e293b;
            border-radius: 0.75rem;
            text-decoration: none;
            color: #e2e8f0;
            transition: background 0.2s, transform 0.2s;
        }
        a.card:hover {
            background: #334155;
            transform: translateY(-2px);
        }
        a.card .name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }
        a.card .desc {
            color: #94a3b8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Apps</h1>
        <p class="subtitle">Side projects deployed on Render</p>
        <div class="links">
            <a class="card" href="https://health-tracker-q6hx.onrender.com" target="_blank">
                <div class="name">Health Tracker 🏥</div>
                <div class="desc">Combined dashboard: exercise, weight, and pull-up calculator in one place.</div>
            </a>
        </div>
    </div>
</body>
</html>
